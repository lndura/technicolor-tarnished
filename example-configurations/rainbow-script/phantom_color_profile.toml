interval = 5000

# Any of these entries apply a rune script to all Param Id's they reference.
[[script]]
param_id_list = [
    60, # Invaders
]
script_path = "rainbow.rn"

# This entry is applied to the player every frame
[player]
param_id = 60 # Invader
override_ridden = true
edge_color_a = 0.1
front_color_a = 0.1
diff_mul_color_a = 0.1
spec_mul_color_a = 0.1
light_color_a = 0.1

edge_color_r = 255
edge_color_g = 0
edge_color_b = 0

front_color_r = 10
front_color_g = 10
front_color_b = 10

diff_mul_color_r = 10
diff_mul_color_g = 10
diff_mul_color_b = 10

spec_mul_color_r = 10
spec_mul_color_g = 10
spec_mul_color_b = 10

light_color_r = 10
light_color_g = 10
light_color_b = 10

alpha = 1.0
blend_rate = 1.0
blend_type = 0
is_edge_subtract = 0
is_front_subtract = 0
is_no2_pass = 0
edge_power = 1.0
glow_scale = 1.0